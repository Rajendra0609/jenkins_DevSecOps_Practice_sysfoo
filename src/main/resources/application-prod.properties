# ──────────────────────────────────────────────────────────────────────────────
# PROD profile — PostgreSQL
# Activate with:  export SPRING_PROFILES_ACTIVE=prod
# Supply credentials via environment variables — never hard-code secrets here.
#
#   export SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/sysfoo
#   export SPRING_DATASOURCE_USERNAME=postgres
#   export SPRING_DATASOURCE_PASSWORD=secret
# ──────────────────────────────────────────────────────────────────────────────

# DataSource (env-var overridable with sensible fallbacks for local testing)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sysfoo}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-test-query=SELECT 1

# Hibernate / JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

