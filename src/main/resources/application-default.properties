# ──────────────────────────────────────────────────────────────────────────────
# DEFAULT profile — SQLite (file-based, zero-setup, great for local dev & CI)
# The DB file is created automatically at ./data/sysfoo.db on first run.
# ──────────────────────────────────────────────────────────────────────────────

# DataSource
# WAL (Write-Ahead Logging) mode prevents locking errors under concurrent reads.
# busy_timeout=30000 makes SQLite wait up to 30 s instead of failing immediately.
spring.datasource.url=jdbc:sqlite:./data/sysfoo.db?journal_mode=WAL&busy_timeout=30000
spring.datasource.driver-class-name=org.sqlite.JDBC

# SQLite has no authentication
spring.datasource.username=
spring.datasource.password=

# ── HikariCP pool settings for SQLite ─────────────────────────────────────────
# SQLite is single-writer; pool-size=1 prevents SQLITE_BUSY locking errors.
spring.datasource.hikari.maximum-pool-size=1

# How long to wait for a connection from the pool before throwing an exception.
spring.datasource.hikari.connection-timeout=30000

# FIX: keepalive-time pings the connection every 60 s to prevent the OS or
# SQLite driver from silently closing an idle connection.  Without this the
# pool holds a stale connection that can never serve requests again.
spring.datasource.hikari.keepalive-time=60000

# Validate the connection is alive before handing it to the app.
spring.datasource.hikari.connection-test-query=SELECT 1

# How long a connection may sit idle before being closed and re-opened.
spring.datasource.hikari.idle-timeout=600000

# Maximum lifetime of any connection in the pool (must be > idle-timeout).
spring.datasource.hikari.max-lifetime=1800000

# ── Hibernate / JPA ───────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
