# ──────────────────────────────────────────────────────────────────────────────
# DEFAULT profile — SQLite (file-based, zero-setup, great for local dev & CI)
# The DB file is created automatically at ./data/sysfoo.db on first run.
# ──────────────────────────────────────────────────────────────────────────────

# DataSource
spring.datasource.url=jdbc:sqlite:./data/sysfoo.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# SQLite has no authentication
spring.datasource.username=
spring.datasource.password=

# SQLite is single-writer; pool size = 1 prevents SQLITE_BUSY locking errors
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.connection-timeout=30000

# Hibernate / JPA
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
